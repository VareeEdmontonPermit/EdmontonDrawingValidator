<!DOCTYPE html>
<html>

<head>
    <!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>-->

    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <script src="js/SvgPanZoom/jquery-3.6.0.min.js"></script>
    <script src="js/SvgPanZoom/svg-pan-zoom.js"></script>
    <script src="js/SvgPanZoom/hammer.js"></script>
    <link href="css/bootstrap-5.0.2-dist/css/bootstrap.css" rel="stylesheet" />
    <script src="css/bootstrap-5.0.2-dist/js/bootstrap.js" type="text/javascript"></script>


    <!--<link href="lib/bootstrap/dist/css/bootstrap.css" rel="stylesheet"/>-->
</head>
<body>

    <style type="text/css">
        g {
            outline: solid 20px blue;
            outline-offset: 5px;
        }

        input[type="checkbox"] {
            padding-left: 5px;
            padding-right: 5px;
            transform: scale(1.3)
        }
    </style>


    <div class="d-flex flex-row">
        <!--Error Block-->
        <div class="col-md-2 border-end shadow-sm" valign="top">
            <div id="divError" style="overflow-y:auto;" class="ps-2 pe-2">
                <div class="pt-2 pb-2 bg-light">
                    <input type="checkbox" id="ShowHideAll" onchange="ShowHideAll()" />
                    <label for="ShowHideAll">Hide All</label>
                </div>
                {LINK_DATA}
            </div>
        </div>
        <!--SVG Block-->
        <div class="col-md-10" style="vertical-align: text-top;">
            <div id="mobile-div" style="height:100%; width:100%;">
                <svg id="mobile-svg"
                     xmlns="http://www.w3.org/2000/svg"
                     style="display: inline;
                                width: inherit;
                                min-width: inherit;
                                max-width: inherit;
                                height: inherit;
                                min-height: inherit;
                                max-height: inherit;
                                stroke-opacity:1.0;
                                "
                     viewBox="0 0 {width} {height}"
                     version="1.1">
                    {SVG_DATA}
                </svg>

            </div>
        </div>
        <!-- Zooming values -->
        <div class="d-flex flex-row position-fixed bg-dark text-white small" style="left:0px;bottom:0px;right:0px;">
            <div class="col-md-2" id="MinXY">minimum : ( {minx} , {miny} )</div>
            <div class="col-md-2" id="MaxXY">maximum : ( {maxx} , {maxy} )</div>
            <div class="col-md-2" id="ZoomRange">Zoom    : [ {minzoom} - {maxzoom} ]</div>
            <div class="col-md-2">Default Zoom : <input type="number" min="1" id="txtDefaultZoom" onchange="SetDefaultZoom()" title="DefaultZoom" style="max-height:20px !important;"></div>
            <div class="col-md-2" id="ZoomLevel"></div>
            <div class="col-md-2" id="PanPoint"></div>

        </div>
    </div>


    <script type="text/javascript">
        //-----------Initialise variables by program
        var minx = parseInt([minx]);
        var miny = parseInt([miny]);
        var maxx = parseInt([maxx]);
        var maxy = parseInt([maxy]);
        var minZoomLevel = parseInt([minzoom]);
        var maxZoomLevel = parseInt([maxzoom]);
        var DefaultZoomLevel = parseInt([defaultZoom]);

        var centerx = parseInt([centerx]);
        var centery = parseInt([centery]);



        //--------Required elements for zooming
        var container = null;
        var panZoomTiger = null;
        container = document.getElementById('#mobile-svg');

        //-------- Initialise SVG PAN ZOOM
        panZoomTiger = svgPanZoom("#mobile-svg", {
            onPan: function (newPan) {
                $("#PanPoint").html("PAN : ( " + parseFloat(newPan.x).toFixed(2) + " , " + parseFloat(newPan.y).toFixed(2) + " )")
            },
            onZoom: function (newScale) {
                $("#ZoomLevel").html("ZOOM : " + parseFloat(newScale).toFixed(2));
            },
            maxZoom: maxZoomLevel,
            minZoom: minZoomLevel,
        });
        panZoomTiger.enablePan();
        panZoomTiger.enableZoom();
        panZoomTiger.controlIconsEnabled = true;
        panZoomTiger.fit = true;
        panZoomTiger.center = true;

        // Don't use window.onLoad like this in production, because it can only listen to one function.

        //---------To do on document is ready
        $(document).ready(function () {
            //Initialise svg height and width as per screen height -- temporary for testing -- remove in production
            setTimeout(function () {
                var url = window.location.href.toLowerCase();
                if (url.indexOf("localhost") >= 0 || url.indexOf("file") >= 0) {
                    $("#mobile-div").css("height", (window.innerHeight - 30) + "px");
                    $("#divError").css("height", (window.innerHeight - 30) + "px");
                }
            }, 20);

            SetBottomBar();
            panZoomTiger.pan({ x: centerx, y: centery });
            GoOnErrorPositionKNL($("g")[0].getBoundingClientRect().x, $("g")[0].getBoundingClientRect().y, $("g")[0].getBoundingClientRect().width, $("g")[0].getBoundingClientRect().height);
            panZoomTiger.zoomAtPoint(DefaultZoomLevel, { x: centerx, y: centery });

            //------------- Bind event on Error checkbox show show and id
            $(".chkError").on('click', function () {
                var errorcheck = $(this).attr("elementId");

                if ($(this).is(":checked")) {
                    $("#ErrorShade" + errorcheck).hide();
                    $("#ErrorText" + errorcheck).hide();
                    $("#Error" + errorcheck).hide();

                }
                else {
                    $("#ErrorShade" + errorcheck).show();
                    $("#ErrorText" + errorcheck).show();
                    $("#Error" + errorcheck).show();

                }
            });

            setTimeout(function () {
                document.getElementById('myFirstLink').click();
            }, 400);


        });

        function ShowHideAll() {
            if ($("#ShowHideAll").is(":checked")) {
                // Hide all
                $(".chkError").each(function () {
                    if (!$(this).is(":checked")) {
                        $(this).trigger("click");
                    }
                });
            }
            else {
                // Show all
                $(".chkError").each(function () {
                    if ($(this).is(":checked")) {
                        $(this).trigger("click");
                    }
                });
            }
        }


        function SetBottomBar() {
            $("#MinXY").html("Minimum : ( " + minx + " , " + miny + " )");
            $("#MaxXY").html("Maximum : ( " + maxx + " , " + maxy + " )");
            $("#ZoomRange").html("Zoom : [ " + minZoomLevel + " - " + maxZoomLevel + " ]");
            $("#txtDefaultZoom").val(DefaultZoomLevel);
            $("#txtDefaultZoom").attr("max", maxZoomLevel);

        }

        function GoOnErrorPositionKNL(x1, y1, width, height) {

            var newzoom = DefaultZoomLevel;
            //     newzoom = width * maxZoomLevel / maxx;

            panZoomTiger.pan({ x: 0, y: 0 });
            panZoomTiger.resetZoom();

            panZoomTiger.zoomAtPointBy(newzoom, { x: 0, y: 0 });
            var realzoom = panZoomTiger.getSizes().realZoom;

            panZoomTiger.pan({
                x: -(x1 * realzoom) + 200,
                y: -(y1 * realzoom) + 200,
            });
            //panZoomTiger.pan({
            //    x: -(x1 * realzoom) + (panZoomTiger.getSizes().width / 2),
            //    y: -(y1 * realzoom) + (panZoomTiger.getSizes().height / 2),
            //});

            panZoomTiger.zoomAtPoint(newzoom, { x: x1, y: y1 });
        }

        function GoOnErrorPosition(x1, y1) {

            panZoomTiger.resetZoom();

            //    panZoomTiger.zoomAtPointBy(1, { x: 0, y: 0 });
            panZoomTiger.zoomAtPointBy(DefaultZoomLevel, { x: 0, y: 0 });

            panZoomTiger.pan({ x: 0, y: 0 });
            var realzoom = panZoomTiger.getSizes().realZoom;


            panZoomTiger.pan({
                x: -(x1 * realzoom) + (panZoomTiger.getSizes().width / 2),
                y: -(y1 * realzoom) + (panZoomTiger.getSizes().height / 2),
            });
            return;
            //  alert("I am here");

            //panZoomTiger.center = 1;
            //panZoomTiger.resize();
            //panZoomTiger.updateBBox();
            //  panZoomTiger.fit();

            //panZoomTiger.zoom = 4;

            //var newX = (x1 + panZoomTiger.getPan().x) + 100;
            //var newY = (y1 + panZoomTiger.getPan().y) + 100;

            //panZoomTiger.zoomAtPointBy(4, { x: newX, y: newY });

            //console.log(panZoomTiger.getPan());
            //console.log(panZoomTiger.getZoom());
            //console.log("hello");
        }

        function SetDefaultZoom() {
            DefaultZoomLevel = $("#txtDefaultZoom").val();
        }






    </script>
</body>
</html>
